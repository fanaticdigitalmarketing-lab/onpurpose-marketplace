<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - OnPurpose</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a2744;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
    }
    
    .container {
      max-width: 400px;
      width: 100%;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      background: #2563d4;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .logo::before {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 8px;
      top: 12px;
      left: 12px;
    }
    
    .logo::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: #2563d4;
      border-radius: 50%;
      bottom: 16px;
      left: 16px;
    }
    
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }
    
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    
    .btn {
      background: #2563d4;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    
    .btn:hover {
      background: #1d4ed8;
    }
    
    .status {
      margin-top: 2rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"></div>
    <h1>You're offline right now</h1>
    <p>Check your connection and we'll pick up where you left off.</p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
    <div class="status">OnPurpose — Book People, Not Places</div>
  </div>
</body>
</html>
