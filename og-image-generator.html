<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OG Image Generator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .og-container {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #22c55e 0%, #3b82f6 100%);
            position: relative;
            overflow: hidden;
        }
        
        .og-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 2;
        }
        
        .og-logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .og-title {
            font-size: 64px;
            font-weight: 900;
            color: white;
            margin-bottom: 20px;
            line-height: 1.1;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .og-subtitle {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .og-tagline {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 600;
        }
        
        .og-decoration {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .decoration-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -100px;
        }
        
        .decoration-2 {
            width: 200px;
            height: 200px;
            bottom: -50px;
            left: -50px;
        }
        
        .decoration-3 {
            width: 100px;
            height: 100px;
            top: 50px;
            left: 100px;
        }
        
        .decoration-4 {
            width: 150px;
            height: 150px;
            bottom: 100px;
            right: 150px;
        }
    </style>
</head>
<body>
    <div class="og-container" id="ogContainer">
        <div class="og-decoration decoration-1"></div>
        <div class="og-decoration decoration-2"></div>
        <div class="og-decoration decoration-3"></div>
        <div class="og-decoration decoration-4"></div>
        
        <div class="og-content">
            <div class="og-logo">OP</div>
            <h1 class="og-title">Book People.<br>Not Places.</h1>
            <p class="og-subtitle">A people-first marketplace for real human connection</p>
            <div class="og-tagline">🤝 Connection, not dating • Skills & Services</div>
        </div>
    </div>
    
    <script>
        // This will help with screenshotting
        console.log('OG Image Ready - Take a screenshot of this page');
        console.log('Dimensions: 1200x630px');
        console.log('Save as: og-image-1200x630.jpg');
    </script>
</body>
</html>
