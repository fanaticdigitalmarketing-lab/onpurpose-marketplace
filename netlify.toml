[build]
  base = "."
  command = "echo 'Static build - no command needed'"
  publish = "."

[build.environment]
  NODE_VERSION = "18"
  # Force rebuild - 2024-04-01-14-45

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    Content-Security-Policy = "connect-src 'self' https://api.stripe.com https://onpurpose.earth https://onpurpose-backend-clean-production.up.railway.app"
